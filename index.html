<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#020208" />
    <meta name="description" content="WebCraft AI Pro — Generate stunning full-stack websites with AI" />

    <title>WebCraft AI Pro</title>

    <!-- Preconnect fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #020208;
      }

      #root {
        width: 100%;
        height: 100%;
      }

      /* Initial loading screen */
      #loading-screen {
        position: fixed;
        inset: 0;
        background: #020208;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }

      #loading-screen.hidden {
        opacity: 0;
        visibility: hidden;
      }

      .loader-logo {
        width: 60px;
        height: 60px;
        border-radius: 18px;
        background: linear-gradient(135deg, #6c63ff, #00d4ff);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 20px;
        animation: pulse-logo 1.5s ease-in-out infinite;
        box-shadow: 0 0 40px rgba(108, 99, 255, 0.5);
      }

      .loader-logo svg {
        width: 28px;
        height: 28px;
        fill: white;
      }

      .loader-title {
        font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
        font-size: 20px;
        font-weight: 800;
        background: linear-gradient(135deg, #6c63ff, #00d4ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 24px;
      }

      .loader-bar-wrap {
        width: 200px;
        height: 3px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 2px;
        overflow: hidden;
      }

      .loader-bar {
        height: 100%;
        background: linear-gradient(90deg, #6c63ff, #00d4ff);
        border-radius: 2px;
        animation: loading-bar 1.8s ease-in-out infinite;
      }

      @keyframes pulse-logo {
        0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(108,99,255,0.5); }
        50% { transform: scale(1.05); box-shadow: 0 0 60px rgba(108,99,255,0.8); }
      }

      @keyframes loading-bar {
        0% { width: 0%; margin-left: 0%; }
        50% { width: 70%; margin-left: 15%; }
        100% { width: 0%; margin-left: 100%; }
      }
    </style>
  </head>

  <body>
    <!-- Loading Screen -->
    <div id="loading-screen">
      <div class="loader-logo">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
        </svg>
      </div>
      <div class="loader-title">WebCraft AI Pro</div>
      <div class="loader-bar-wrap">
        <div class="loader-bar"></div>
      </div>
    </div>

    <!-- App Root -->
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

    <script>
      // Hide loading screen when app is ready
      window.addEventListener('load', () => {
        setTimeout(() => {
          const screen = document.getElementById('loading-screen')
          if (screen) {
            screen.classList.add('hidden')
            setTimeout(() => screen.remove(), 500)
          }
        }, 800)
      })
    </script>
  </body>
</html>
